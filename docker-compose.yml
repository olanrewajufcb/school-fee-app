version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: schoolfee-db
    environment:
      POSTGRES_DB: schoolfee_db
      POSTGRES_USER: sch_fee_user
      POSTGRES_PASSWORD: sch_pwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sch_fee_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - schoolfee-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: schoolfee-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/sch_keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_PORT: 8081
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: superadmin
      KEYCLOAK_ADMIN_PASSWORD: Admin123!
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - schoolfee-network
    volumes:
      - ./backend/keycloak/import:/opt/keycloak/data/import
    entrypoint: >
      /bin/sh -c "
      /opt/keycloak/bin/kc.sh start-dev --import-realm
      "

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schoolfee-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      SCHOOL_FEE_DB_PASSWORD: sch_pwd
      FLYWAY_DB_PASSWORD: sch_pwd
      JWT_SECRET: mySecureSecretKey1234567890
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: superadmin
      KEYCLOAK_ADMIN_PASSWORD: Admin123!
      KEYCLOAK_CLIENT_SECRET: backend-secret-change-in-production
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - schoolfee-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schoolfee-frontend
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - schoolfee-network
    restart: unless-stopped

  # Mailpit (modern MailHog replacement for testing email notifications, natively supports arm64)
  mailhog:
    image: axllent/mailpit:latest
    container_name: schoolfee-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - schoolfee-network

volumes:
  postgres_data:

networks:
  schoolfee-network:
    driver: bridge
#    internal: true
