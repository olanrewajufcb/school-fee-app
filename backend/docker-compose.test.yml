version: '3.8'

services:
  # PostgreSQL for integration tests
  postgres-test:
    image: postgres:16-alpine
    container_name: school-fee-test-db
    environment:
      POSTGRES_DB: school_fee_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5432:5432"  # Using standard PostgreSQL port
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d school_fee_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
